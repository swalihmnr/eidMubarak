<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eid Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#090909,#1d0f15,#3b0d2c);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* Floating Stars */

.stars{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-10vh);
        opacity:1;
    }
}

/* Main Container */

.container{
    width:350px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 30px rgba(255,105,180,0.3);
}

/* Heading */

.typing{
    font-size:24px;
    font-weight:600;
    color:#ffd1dc;
    margin-bottom:25px;
    min-height:70px;
}
<div id="loader">
<h1>initializing surprise...</h1>
</div>

/* Password */

.password-box{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

#password{
    width:220px;
    padding:12px;
    border:none;
    border-radius:15px;
    outline:none;
    background:rgba(255,255,255,0.1);
    color:white;
    text-align:center;
    font-size:18px;
}

/* Buttons */

.keypad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:15px;
}

.key{
    padding:15px;
    border:none;
    border-radius:50%;
    background:#ff7eb3;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.key:hover{
    transform:scale(1.1);
    background:#ff4f93;
}

/* Surprise Page */

.surprise{
    display:none;
    animation:fadeIn 2s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Polaroid */

.polaroid{
    background:white;
    padding:10px;
    border-radius:10px;
    width:220px;
    margin:20px auto;
    transform:rotate(-3deg);
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.polaroid img{
    width:100%;
    border-radius:5px;
}

.polaroid p{
    color:black;
    margin-top:10px;
    font-weight:600;
}

/* Birthday Message */

.message{
    margin-top:20px;
    line-height:1.8;
    color:#ffe4ec;
}

/* Button */

.music-btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4f93;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.music-btn:hover{
    background:#ff1f72;
    transform:scale(1.05);
}

/* Cake */

.cake{
    font-size:60px;
    margin-top:15px;
    animation:glow 1.5s infinite alternate;
}

@keyframes glow{
    from{
        filter:drop-shadow(0 0 5px #ffb6c1);
    }
    to{
        filter:drop-shadow(0 0 20px #fff);
    }
}

</style>
</head>
<body>

<div class="stars"></div>

<div class="container">

    <div id="lockScreen">

        <div class="typing" id="typing"></div>

        <div class="password-box">
            <input type="password" id="password" placeholder="Enter Password">
        </div>

        <div class="keypad">
            <button class="key">1</button>
            <button class="key">2</button>
            <button class="key">3</button>
            <button class="key">4</button>
            <button class="key">5</button>
            <button class="key">6</button>
            <button class="key">7</button>
            <button class="key">8</button>
            <button class="key">9</button>
            <button class="key">*</button>
            <button class="key">0</button>
            <button class="key">#</button>
        </div>

        <button class="music-btn" onclick="checkPassword()">Unlock</button>

    </div>

    <!-- Surprise Page -->

    <div class="surprise" id="surprise">

        <h1>🎉💖ബലി പെരുന്നാൾ ആശംസകൾ 🎉💖</h1>

        <div class="love">💖💖💖💖💖💖</div>

        <div class="polaroid">
            <img src="C:\Users\lenovo\Downloads\1000443000 (1).jpg"alt="EID DAY"><p text="black">Best Memories💖</p>
        </div>

        <div class="message">
            Alhamdulillah for the blessing of family- a mercy from Allah that brings peace to heart💖🌙✨<br><br>
            May our smile always stay bright like the stars 💫
        </div>

        <button class="music-btn" onclick="playMusic()">Play Music 🎵</button>

    </div>

</div>

<!-- Music -->

<audio controls>
    <source src="C:\Users\lenovo\Downloads\WhatsApp Audio 2026-05-27 at 9.56.36 PM.mp4" type="audio/mp4">
</audio>

<script>

/* Typing Effect */

const text = "POV: A small surprise, A big smile & An Unforgettable EID.";
let i = 0;

function typingEffect(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typingEffect,60);
    }
}

typingEffect();

/* Stars */

for(let i=0;i<80;i++){

    let star = document.createElement("div");
    star.classList.add("star");

    star.style.left = Math.random()*100 + "vw";
    star.style.animationDuration = Math.random()*5 + 3 + "s";
    star.style.opacity = Math.random();

    document.querySelector(".stars").appendChild(star);
}

/* Keypad */

const keys = document.querySelectorAll(".key");

keys.forEach(key=>{
    key.addEventListener("click",()=>{
        document.getElementById("password").value += key.innerText;
    });
});

/* Password Check */

function checkPassword(){

    const password = document.getElementById("password").value;

    if(password === "2026"){

        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("surprise").style.display = "block";

        confetti();

    }else{
        alert("Wrong Password 💔");
    }
}

/* Music */

function playMusic(){
    document.getElementById("song").play();
}

/* Confetti */

function confetti(){

    for(let i=0;i<150;i++){

        let conf = document.createElement("div");

        conf.style.position="fixed";
        conf.style.width="10px";
        conf.style.height="10px";
        conf.style.background=`hsl(${Math.random()*360},100%,70%)`;
        conf.style.left=Math.random()*100+"vw";
        conf.style.top="-10px";
        conf.style.borderRadius="50%";
        conf.style.zIndex="9999";

        document.body.appendChild(conf);

        let fall = conf.animate([
            {transform:"translateY(0) rotate(0deg)"},
            {transform:`translateY(100vh) rotate(${Math.random()*720}deg)`}
        ],{
            duration:3000 + Math.random()*2000,
            easing:"linear"
        });

        fall.onfinish=()=>{
            conf.remove();
        }
    }
}

</script>

</body>
</html>
